<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - DeftSecret</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0c0a09;
      --primary: #d97706;
      --primary-hover: #b45309;
      --primary-glow: rgba(217, 119, 6, 0.25);
      --accent: #ca8a04;
      --card-bg: rgba(28, 25, 23, 0.85);
      --card-border: rgba(255, 255, 255, 0.05);
      --input-bg: rgba(20, 18, 16, 0.6);
      --input-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-success: #34d399;
      --text-error: #f87171;
      --text-warning: #fbbf24;
      --font-sans: 'Outfit', sans-serif;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light-theme {
      --bg-main: #f5f5f4;
      --primary-glow: rgba(217, 119, 6, 0.15);
      --card-bg: rgba(255, 255, 255, 0.9);
      --card-border: rgba(0, 0, 0, 0.08);
      --input-bg: rgba(255, 255, 255, 0.95);
      --input-border: rgba(0, 0, 0, 0.15);
      --text-main: #1c1917;
      --text-muted: #57534e;
      --text-success: #16a34a;
      --text-error: #dc2626;
      --text-warning: #d97706;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      padding: 2rem 1.25rem;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.1;
      z-index: 0;
      pointer-events: none;
    }

    body.light-theme .glow {
      opacity: 0.05;
    }

    .glow-1 {
      background: var(--primary);
      top: -100px;
      right: -100px;
    }

    .glow-2 {
      background: #ca8a04;
      bottom: -150px;
      left: -150px;
    }

    .admin-container {
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    /* Top Nav styling */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 1.5rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      font-size: 2rem;
    }

    .logo-area h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-area h1 span {
      font-size: 0.8rem;
      font-weight: 500;
      background: var(--primary-glow);
      color: var(--primary);
      border: 1px solid var(--primary);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .theme-toggle-btn {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-main);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1.1rem;
    }

    .theme-toggle-btn:hover {
      background: var(--primary-glow);
      border-color: var(--primary);
    }

    .btn {
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
    }

    .btn-danger {
      background: var(--text-error);
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
    }

    .btn-secondary {
      background: var(--input-bg);
      border-color: var(--input-border);
      color: var(--text-main);
    }

    body.light-theme .btn-secondary {
      background: rgba(0, 0, 0, 0.04);
      border-color: rgba(0, 0, 0, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--text-muted);
    }

    body.light-theme .btn-secondary:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    .btn-icon {
      padding: 0.4rem;
      border-radius: 6px;
      font-size: 0.85rem;
    }

    /* Metric Cards Grid */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .metric-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
    }

    .metric-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-main);
    }

    /* Search & Table card */
    .data-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .search-input {
      flex-grow: 1;
      max-width: 400px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-main);
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Table styling */
    .table-responsive {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.9rem;
    }

    th {
      padding: 1rem;
      color: var(--text-muted);
      font-weight: 600;
      border-bottom: 2px solid var(--card-border);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid var(--card-border);
      color: var(--text-main);
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .secret-id {
      font-family: monospace;
      font-weight: 600;
      color: var(--primary);
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 6px;
      line-height: 1;
    }

    .badge-success {
      background: rgba(52, 211, 153, 0.15);
      color: var(--text-success);
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    .badge-warning {
      background: rgba(251, 191, 36, 0.15);
      color: var(--text-warning);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .badge-error {
      background: rgba(248, 113, 113, 0.15);
      color: var(--text-error);
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .badge-info {
      background: rgba(148, 163, 184, 0.15);
      color: var(--text-muted);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .actions-cell {
      display: flex;
      gap: 0.5rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    /* Modal styling */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .modal-close:hover {
      color: var(--text-main);
    }

    .meta-details {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .meta-row {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .meta-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .meta-val {
      font-size: 0.95rem;
      word-break: break-all;
    }

    .code-block {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      padding: 0.75rem;
      font-family: monospace;
      font-size: 0.85rem;
      overflow-x: auto;
      max-height: 200px;
    }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="admin-container">
    <header class="admin-header">
      <div class="logo-area">
        <span class="logo-icon">🔒</span>
        <h1>DeftSecret <span>Admin Portal</span></h1>
      </div>
      <div class="nav-actions">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Cambiar tema">🌙</button>
        <a href="/logout" class="btn btn-secondary">Cerrar Sesión</a>
      </div>
    </header>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Secretos Totales</div>
        <div class="metric-value" id="metric-total">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Secretos Activos</div>
        <div class="metric-value" id="metric-active" style="color: var(--text-success);">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">De un solo uso</div>
        <div class="metric-value" id="metric-onetime" style="color: var(--text-warning);">0</div>
      </div>
    </div>

    <div class="data-card">
      <div class="filter-bar">
        <input type="text" id="search" class="search-input" placeholder="Buscar por ID de secreto...">
        <button id="refresh-btn" class="btn btn-secondary">🔄 Actualizar</button>
      </div>

      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>ID Secreto</th>
              <th>Fecha Creación</th>
              <th>Disponible</th>
              <th>Expiración</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="secrets-table-body">
            <tr>
              <td colspan="6" class="empty-state">Cargando secretos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="details-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Detalles del Secreto</h3>
        <button type="button" class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="meta-details" id="modal-details-content">
        <!-- Filled dynamically -->
      </div>
    </div>
  </div>

  <script>
    let secretsList = [];

    // Format Dates helper
    function formatDate(isoStr) {
      if (!isoStr) return '-';
      try {
        const d = new Date(isoStr);
        return d.toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
      } catch (e) {
        return isoStr;
      }
    }

    // Load secrets list from API
    async function loadSecrets() {
      try {
        const r = await fetch('/api/secrets');
        if (r.status === 401) {
          window.location.href = '/login';
          return;
        }
        secretsList = await r.json();
        renderDashboard();
      } catch (err) {
        console.error('Error loading secrets:', err);
        document.getElementById('secrets-table-body').innerHTML = `
          <tr>
            <td colspan="6" class="empty-state" style="color: var(--text-error);">Error al cargar los secretos del servidor.</td>
          </tr>
        `;
      }
    }

    // Render Metrics and Table rows
    function renderDashboard() {
      const tbody = document.getElementById('secrets-table-body');
      const searchQuery = document.getElementById('search').value.toLowerCase().trim();
      
      const filtered = secretsList.filter(s => s.id.toLowerCase().includes(searchQuery));
      
      // Calculate metrics
      const now = new Date();
      let activeCount = 0;
      let oneTimeCount = 0;

      secretsList.forEach(s => {
        const release = s.releaseDate ? new Date(s.releaseDate) : null;
        const expire = s.expireDate ? new Date(s.expireDate) : null;
        
        const isNotReleasedYet = release && release > now;
        const isExpired = expire && expire < now;
        
        if (!isNotReleasedYet && !isExpired) {
          activeCount++;
        }
        if (s.oneTime) {
          oneTimeCount++;
        }
      });

      document.getElementById('metric-total').textContent = secretsList.length;
      document.getElementById('metric-active').textContent = activeCount;
      document.getElementById('metric-onetime').textContent = oneTimeCount;

      if (filtered.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="empty-state">No se han encontrado secretos registrados.</td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = filtered.map(s => {
        const release = s.releaseDate ? new Date(s.releaseDate) : null;
        const expire = s.expireDate ? new Date(s.expireDate) : null;
        
        const isNotReleasedYet = release && release > now;
        const isExpired = expire && expire < now;
        
        let statusBadge = '';
        if (isExpired) {
          statusBadge = '<span class="badge badge-error">Expirado</span>';
        } else if (isNotReleasedYet) {
          statusBadge = '<span class="badge badge-warning">Bloqueado (Fecha)</span>';
        } else {
          statusBadge = '<span class="badge badge-success">Activo</span>';
        }

        const oneTimeText = s.oneTime ? ' 🔥 Un solo uso' : '';

        return `
          <tr id="row-${s.id}">
            <td class="secret-id">${s.id}</td>
            <td>${formatDate(s.createdAt)}</td>
            <td>${s.releaseDate ? formatDate(s.releaseDate) : 'Inmediato'}</td>
            <td>${s.expireDate ? formatDate(s.expireDate) : 'Nunca'}</td>
            <td>${statusBadge}${oneTimeText}</td>
            <td class="actions-cell">
              <button class="btn btn-secondary btn-icon" onclick="viewDetails('${s.id}')" title="Ver Metadatos">👁️</button>
              <button class="btn btn-danger btn-icon" onclick="deleteSecret('${s.id}')" title="Eliminar Secreto">🗑️</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // View raw metadata details
    async function viewDetails(id) {
      try {
        const r = await fetch(`/api/secrets/${id}`);
        if (!r.ok) throw new Error('Failed to load secret details');
        const data = await r.json();
        
        const content = `
          <div class="meta-row">
            <span class="meta-label">ID del Secreto</span>
            <span class="meta-val secret-id">${data.id}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Fecha Creación</span>
            <span class="meta-val">${formatDate(data.createdAt)}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Disponible Desde</span>
            <span class="meta-val">${data.releaseDate ? formatDate(data.releaseDate) : 'Inmediatamente al crear'}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Fecha Expiración</span>
            <span class="meta-val">${data.expireDate ? formatDate(data.expireDate) : 'Nunca'}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Autodestrucción al leer (Un solo uso)</span>
            <span class="meta-val">${data.oneTime ? 'Sí' : 'No'}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Initialization Vector (IV)</span>
            <div class="code-block">${data.iv}</div>
          </div>
          <div class="meta-row">
            <span class="meta-label">Key Derivation Salt</span>
            <div class="code-block">${data.salt}</div>
          </div>
          <div class="meta-row">
            <span class="meta-label">Texto Cifrado (Payload E2E)</span>
            <div class="code-block" style="word-break: break-all; white-space: pre-wrap;">${data.encryptedText}</div>
          </div>
        `;
        
        document.getElementById('modal-details-content').innerHTML = content;
        document.getElementById('details-modal').classList.add('open');
      } catch (err) {
        alert('Error al cargar la información del secreto.');
      }
    }

    function closeModal() {
      document.getElementById('details-modal').classList.remove('open');
    }

    // Delete secret call
    async function deleteSecret(id) {
      if (!confirm(`¿Estás seguro de que quieres eliminar de forma permanente el secreto ${id}?`)) {
        return;
      }
      
      try {
        const r = await fetch(`/api/secrets/${id}`, { method: 'DELETE' });
        const res = await r.json();
        if (res.success) {
          secretsList = secretsList.filter(s => s.id !== id);
          renderDashboard();
        } else {
          alert('Error al borrar: ' + (res.error || 'Inténtalo de nuevo.'));
        }
      } catch (err) {
        alert('Error de conexión con el servidor.');
      }
    }

    // Close modal when clicking outside
    window.addEventListener('click', (e) => {
      const modal = document.getElementById('details-modal');
      if (e.target === modal) {
        closeModal();
      }
    });

    // Theme Toggle Logic
    const themeToggle = document.getElementById('theme-toggle');
    function setTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('light-theme');
        if (themeToggle) themeToggle.textContent = '☀️';
        localStorage.setItem('admin-theme', 'light');
      } else {
        document.body.classList.remove('light-theme');
        if (themeToggle) themeToggle.textContent = '🌙';
        localStorage.setItem('admin-theme', 'dark');
      }
    }

    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        if (document.body.classList.contains('light-theme')) {
          setTheme('dark');
        } else {
          setTheme('light');
        }
      });
    }

    // Initial checks
    const savedTheme = localStorage.getItem('admin-theme');
    if (savedTheme === 'light') {
      setTheme('light');
    } else {
      setTheme('dark');
    }

    // Search bar event
    document.getElementById('search').addEventListener('input', renderDashboard);
    
    // Refresh button event
    document.getElementById('refresh-btn').addEventListener('click', loadSecrets);

    // Initial Load
    window.addEventListener('DOMContentLoaded', loadSecrets);
  </script>
</body>
</html>
