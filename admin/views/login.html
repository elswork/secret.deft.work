<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Admin - DeftSecret</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0c0a09;
      --primary: #d97706;
      --primary-hover: #b45309;
      --primary-glow: rgba(217, 119, 6, 0.25);
      --card-bg: rgba(28, 25, 23, 0.85);
      --card-border: rgba(255, 255, 255, 0.05);
      --input-bg: rgba(20, 18, 16, 0.6);
      --input-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-error: #f87171;
      --font-sans: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background glows */
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
    }

    .glow-1 {
      background: var(--primary);
      top: -100px;
      right: -100px;
    }

    .glow-2 {
      background: #ca8a04;
      bottom: -150px;
      left: -150px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      z-index: 10;
    }

    .logo-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      font-size: 2.5rem;
      filter: drop-shadow(0 0 10px var(--primary-glow));
      margin-bottom: 0.5rem;
      display: inline-block;
    }

    .logo-header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(135deg, #ffffff 30%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2.25rem 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 500;
      color: #e2e8f0;
      margin-bottom: 0.5rem;
    }

    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text-main);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
      background: rgba(20, 18, 16, 0.85);
    }

    .error-message {
      color: var(--text-error);
      font-size: 0.85rem;
      margin-bottom: 1rem;
      text-align: center;
      background: rgba(248, 113, 113, 0.1);
      padding: 0.50rem;
      border-radius: 6px;
      border: 1px solid rgba(248, 113, 113, 0.2);
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 0 12px var(--primary-glow);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="login-container">
    <div class="logo-header">
      <span class="logo-icon">🛠️</span>
      <h1>Panel de Control</h1>
      <p>Administración de Secretos DeftSecret</p>
    </div>

    <div class="card">
      <form action="/login" method="POST">
        <div class="form-group">
          <label for="password">Contraseña de Administrador</label>
          <input type="password" id="password" name="password" placeholder="Introduce la clave" required autofocus>
        </div>

        <div id="error-container"></div>

        <button type="submit" class="btn">Entrar al Panel</button>
      </form>
    </div>
  </div>

  <script>
    // Show error message if query param is set
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error')) {
      const errorContainer = document.getElementById('error-container');
      errorContainer.innerHTML = '<div class="error-message">🔑 Contraseña incorrecta. Inténtalo de nuevo.</div>';
    }
  </script>
</body>
</html>
